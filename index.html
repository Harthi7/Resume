<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Hologram Resume</title>
    <meta
      name="description"
      content="Interactive 3D hologram resume experience rendered in the browser."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scanlines"></div>
    <canvas id="scene"></canvas>

    <div class="hud">
      <header class="hud-panel hud-header">
        <div>
          <span class="eyebrow">3D HOLOGRAM RESUME</span>
          <h1 id="hudName">Your Name</h1>
          <p id="hudTitle">Software Engineer</p>
        </div>
        <button id="autoRotateButton" class="ghost-button" type="button">Pause Orbit</button>
      </header>

      <aside class="hud-panel hud-brief">
        <div class="label-row">
          <span class="label">Summary</span>
          <span class="live-dot"></span>
        </div>
        <p id="hudSummary"></p>

        <div class="metrics" id="metricGrid"></div>

        <div class="help-grid">
          <div><span>Drag</span><strong>Rotate</strong></div>
          <div><span>Scroll</span><strong>Zoom</strong></div>
          <div><span>Click Card</span><strong>Inspect</strong></div>
          <div><span>1-6</span><strong>Jump</strong></div>
        </div>
      </aside>

      <section class="hud-panel hud-detail">
        <div class="label-row">
          <span class="label">Selected Module</span>
          <span id="detailIndex" class="small-tag">01</span>
        </div>
        <h2 id="detailTitle">Profile</h2>
        <p id="detailSubtitle" class="detail-subtitle"></p>
        <ul id="detailBullets" class="detail-list"></ul>
      </section>

      <footer class="hud-panel hud-footer">
        <div class="footer-left">
          <span class="label">Mode</span>
          <strong>Interactive 3D review</strong>
        </div>
        <div class="footer-actions">
          <button id="focusDeviceButton" class="ghost-button" type="button">Center Device</button>
          <button id="focusCardButton" class="primary-button" type="button">Focus Selected Card</button>
        </div>
      </footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
