<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatial Hologram Resume</title>
    <meta
      name="description"
      content="A stage-first hologram resume with a central projector device, outward-facing cards, and interactive camera controls."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-layers" aria-hidden="true">
      <div class="nebula nebula-a"></div>
      <div class="nebula nebula-b"></div>
      <div class="scanlines"></div>
      <div class="noise"></div>
    </div>

    <main class="viewport-shell">
      <section id="stage" class="stage" aria-label="Interactive hologram stage">
        <div class="stage-vignette"></div>
        <div id="world" class="world">
          <div class="floor floor-outer"></div>
          <div class="floor floor-inner"></div>
          <div class="stage-grid"></div>
          <div class="halo halo-a"></div>
          <div class="halo halo-b"></div>

          <div class="device-group">
            <div class="base-tier tier-1"></div>
            <div class="base-tier tier-2"></div>
            <div class="base-tier tier-3"></div>
            <div class="projector-body"></div>
            <div class="projector-top"></div>
            <div class="projector-slot"></div>
            <div class="projector-emitter"></div>
            <div class="beam beam-core"></div>
            <div class="beam beam-shell"></div>
            <div class="beam-cap"></div>
            <div class="pulse-ring pulse-ring-a"></div>
            <div class="pulse-ring pulse-ring-b"></div>
            <div class="pulse-ring pulse-ring-c"></div>
          </div>

          <div id="moduleOrbit" class="module-orbit"></div>
          <div id="beamParticles" class="beam-particles"></div>
        </div>
      </section>

      <header class="hud-panel hero-panel">
        <div class="panel-kicker">Spatial Resume</div>
        <h1 id="heroName">Your Name</h1>
        <p id="heroTitle">Software Engineer · Platform Builder · Systems Operator</p>
        <p id="heroSummary" class="hero-summary"></p>
      </header>

      <aside class="hud-panel detail-panel">
        <div class="panel-head">
          <div>
            <div class="panel-kicker">Selected Module</div>
            <div id="detailIndex" class="module-index">01</div>
          </div>
          <button id="focusButton" class="chip-button ghost" type="button">Focus Module</button>
        </div>
        <h2 id="detailTitle">Profile</h2>
        <p id="detailSubtitle" class="detail-subtitle"></p>
        <ul id="detailBullets" class="detail-bullets"></ul>
      </aside>

      <aside class="hud-panel nav-panel">
        <div class="panel-kicker">Modules</div>
        <div id="moduleNav" class="module-nav"></div>
      </aside>

      <footer class="hud-panel dock-panel">
        <div class="dock-left">
          <div class="control-card">
            <span>Drag</span>
            <strong>Rotate view</strong>
          </div>
          <div class="control-card">
            <span>Scroll</span>
            <strong>Zoom</strong>
          </div>
          <div class="control-card">
            <span>1-6</span>
            <strong>Jump module</strong>
          </div>
        </div>

        <div id="statRail" class="stat-rail"></div>

        <div class="dock-actions">
          <button id="orbitButton" class="chip-button ghost" type="button">Pause Orbit</button>
          <button id="centerButton" class="chip-button primary" type="button">Center Stage</button>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
