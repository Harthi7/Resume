<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdullah Alharthi | Software Engineer</title>
    <meta
      name="description"
      content="Abdullah Alharthi — software engineer at IBM working on watsonx.data, with experience in backend services, REST APIs, Kubernetes, and CI/CD."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background" aria-hidden="true">
      <div class="glow glow-a"></div>
      <div class="glow glow-b"></div>
      <div class="scanlines"></div>
      <div class="noise"></div>
    </div>

    <main class="app-shell">
      <button id="uiToggleButton" class="ui-toggle" type="button">Hide UI</button>

      <header id="hud" class="hud hud-top">
        <div class="hud-block">
          <div class="hud-kicker">Projected Resume</div>
          <h1 id="hudName">Abdullah Alharthi</h1>
          <p id="hudTitle">Software Engineer</p>
        </div>
      </header>

      <section id="stage" class="stage" aria-label="Interactive holographic resume scene">
        <div class="vignette"></div>
        <div id="world" class="world">
          <div class="device-stack">
            <div class="device-shadow"></div>
            <div class="device-body"></div>
            <div class="device-edge"></div>
            <div class="device-glass"></div>
            <div class="device-core"></div>
            <div class="device-emitter"></div>
            <div class="beam beam-inner"></div>
            <div class="beam beam-outer"></div>
            <div class="beam-aura"></div>
          </div>

          <div id="sparkLayer" class="spark-layer" aria-hidden="true"></div>

          <div id="sheetRig" class="sheet-rig">
            <div class="sheet-aura"></div>
            <article id="resumeSheet" class="resume-sheet" aria-label="Resume sheet">
              <section id="sheetFront" class="sheet-face sheet-front"></section>
              <section id="sheetBack" class="sheet-face sheet-back"></section>
            </article>
          </div>
        </div>
      </section>

      <footer id="dock" class="hud hud-dock">
        <div class="dock-group dock-info">
          <div class="dock-chip"><span>Drag</span><strong>Rotate</strong></div>
          <div class="dock-chip"><span>Wheel</span><strong>Zoom</strong></div>
        </div>
        <div class="dock-group dock-actions">
          <button id="orbitButton" class="ghost-button" type="button">Pause</button>
          <button id="resetButton" class="primary-button" type="button">Reset</button>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
